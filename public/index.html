<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Diary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header>
      <h1>Dream Diary</h1>
      <p class="subtitle">Turn your dreams into beautiful images</p>
    </header>

    <main>
      <section class="form-section">
        <form id="dream-form">
          <input
            type="text"
            id="dream-title"
            placeholder="Dream title"
            maxlength="150"
            required
          />
          <textarea
            id="dream-description"
            placeholder="Describe your dream..."
            rows="5"
            required
          ></textarea>
          <div class="form-actions">
            <button type="submit" id="save-btn">Save Dream</button>
          </div>
        </form>
        <div id="form-error" class="error-msg hidden"></div>
      </section>

      <section class="feed-section">
        <h2>Recent Dreams</h2>
        <div id="usage-status" class="usage-bar hidden">
          <span id="usage-text"></span>
        </div>
        <div id="dreams-feed">
          <p class="empty-state">
            No dreams recorded yet. Write your first one above.
          </p>
        </div>
      </section>
    </main>

    <!-- Edit Modal -->
    <div
      id="edit-modal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-content">
        <h3 id="modal-title">Edit Dream</h3>
        <input
          type="text"
          id="edit-title"
          placeholder="Dream title"
          maxlength="150"
          required
        />
        <textarea
          id="edit-description"
          placeholder="Describe your dream..."
          rows="5"
          required
        ></textarea>
        <div id="edit-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button id="edit-save-btn">Save Changes</button>
          <button id="edit-cancel-btn" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>
    <div id="modal-overlay" class="overlay hidden"></div>

    <script src="/js/app.js"></script>
  </body>
</html>
